<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site do Davi</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
margin:0;
text-align:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
display:flex;
justify-content:space-around;
flex-wrap:wrap;
padding:20px;
}

.site{
max-width:500px;
}

.caixa{
background:#111;
padding:15px;
border-radius:10px;
margin-top:20px;
}

textarea{
width:100%;
height:150px;
border-radius:8px;
border:none;
padding:10px;
}

input{
width:80%;
padding:8px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:red;
color:white;
cursor:pointer;
margin:5px;
}

#relogio{
font-size:24px;
color:cyan;
margin-bottom:10px;
}

/* conquista */

.conquista{
position:fixed;
top:20px;
right:-320px;
width:260px;
background:#222;
border-left:5px solid gold;
padding:10px;
border-radius:8px;
transition:0.5s;
}

.conquista.mostrar{
right:20px;
}

.conquista h3{
margin:0;
color:gold;
}

</style>
</head>

<body>

<div id="conquista" class="conquista">
<h3 id="titulo"></h3>
<p id="texto"></p>
</div>

<canvas id="estrelas"></canvas>

<h1>Meu primeiro site</h1>

<div id="relogio"></div>

<div class="container">

<div class="site">

<p>Acabei de criar meu primeiro site</p>
<p>eu não fiz nada sobre o site até agora, mas vou fazer</p>

<button>ME AJUDE</button>
<button>DOE AQUI</button>

<p>não tem pix</p>
<p>ainda.</p>

<p>atualizando quase todo dia</p>
<p>eu amo programação, você ama programação?</p>

<div class="caixa">

<h2>🎮 Minijogo</h2>

<p>Pontos: <span id="pontos">0</span></p>

<button onclick="clicar()">CLIQUE</button>

</div>

<div class="caixa">

<h2>💡 Sugestões</h2>

<input id="sugestao" placeholder="Escreva uma sugestão">

<button onclick="enviarSug()">Enviar</button>

<div id="listaSug"></div>

</div>

</div>

<div class="site">

<div class="caixa">

<h2>📖 Livro de Anotações</h2>

<textarea id="livro"></textarea>

<br>

<button onclick="salvar()">Salvar</button>
<button onclick="limpar()">Apagar</button>

</div>

</div>

</div>

<script>

/* relógio */

function atualizarRelogio(){

let a=new Date()

let h=a.getHours().toString().padStart(2,"0")
let m=a.getMinutes().toString().padStart(2,"0")
let s=a.getSeconds().toString().padStart(2,"0")

document.getElementById("relogio").innerText=h+":"+m+":"+s

}

setInterval(atualizarRelogio,1000)
atualizarRelogio()

/* livro */

function salvar(){

let t=document.getElementById("livro").value
localStorage.setItem("livro",t)

}

function limpar(){

localStorage.removeItem("livro")
document.getElementById("livro").value=""

}

window.onload=function(){

let t=localStorage.getItem("livro")

if(t){
document.getElementById("livro").value=t
}

}

/* sugestões */

function enviarSug(){

let s=document.getElementById("sugestao").value

if(s!=""){

let div=document.getElementById("listaSug")

div.innerHTML+="<p>"+s+"</p>"

document.getElementById("sugestao").value=""

}

}

/* minijogo */

let pontos=0

function clicar(){

pontos++

document.getElementById("pontos").innerText=pontos

if(pontos==100){
conquista("Curioso","100 pontos!")
}

if(pontos==200){
conquista("Cliqueiro","200 pontos!")
}

if(pontos==300){
conquista("Sem vida","300 pontos kkk")
}

}

function conquista(titulo,texto){

let c=document.getElementById("conquista")

document.getElementById("titulo").innerText="🏆 "+titulo
document.getElementById("texto").innerText=texto

c.classList.add("mostrar")

setTimeout(()=>{
c.classList.remove("mostrar")
},4000)

}

/* estrelas */

let canvas=document.getElementById("estrelas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrelas=[]

for(let i=0;i<20;i++){

estrelas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})

}

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

for(let e of estrelas){

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()

e.y+=0.3

if(e.y>canvas.height){
e.y=0
}

}

requestAnimationFrame(animar)

}

animar()

</script>

</body>
</html>
