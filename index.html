<!DOCTYPE html>
<html>
<head>
<title>Meu Site</title>

<style>

body{
  font-family: Arial;
  background:black;
  color:white;
  margin:0;
  overflow-x:hidden;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.site{
  width:60%;
  text-align:center;
}

.livro{
  width:35%;
  background:#111;
  padding:15px;
  border-radius:10px;
}

textarea{
  width:100%;
  height:200px;
  border-radius:8px;
  border:none;
  padding:10px;
}

.salvar{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#4CAF50;
  color:white;
}

.botao{
  background:red;
  color:white;
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  animation:piscar 1s infinite;
  margin:10px;
}

@keyframes piscar{
  0%{opacity:1;}
  50%{opacity:0.4;}
  100%{opacity:1;}
}

.relogio{
  font-size:25px;
  color:cyan;
}

.jogo{
  margin-top:30px;
}

.sugestao{
  margin-top:20px;
}

</style>
</head>

<body>

<canvas id="estrelas"></canvas>

<div class="container">

<div class="site">

<h1>Meu primeiro site</h1>

<div class="relogio" id="relogio"></div>

<img src="SQcQgAT.png" width="100">

<p>Acabei de criar meu primeiro site</p>

<p>eu não fiz nada sobre o site até agora, mas vou fazer</p>

<img src="3nnUN0M.png" width="100" height="100">

<br><br>

<button class="botao">ME AJUDE</button>
<button class="botao">DOE AQUI</button>

<p>não tem pix</p>
<p>ainda.</p>
<p>te amo</p>

<p>atualizando quase todo dia</p>

<p>eu amo programação, você ama programação?</p>

<div class="jogo">

<h2>🎮 Minijogo</h2>

<p>Pontos: <span id="pontos">0</span></p>

<button onclick="clicar()">CLIQUE AQUI</button>

</div>

<div class="sugestao">

<h2>💡 Sugestões</h2>

<input id="sug" placeholder="Escreva uma sugestão">

<button onclick="enviarSug()">Enviar</button>

<p id="listaSug"></p>

</div>

</div>

<div class="livro">

<h2>📖 Livro de Anotações</h2>

<textarea id="texto"></textarea>

<br>

<button class="salvar" onclick="salvar()">Salvar</button>
<button class="salvar" onclick="limpar()">Apagar</button>

</div>

</div>

<script>

/* RELÓGIO */

function atualizarRelogio(){
let agora=new Date()

let h=agora.getHours()
let m=agora.getMinutes()
let s=agora.getSeconds()

if(h<10)h="0"+h
if(m<10)m="0"+m
if(s<10)s="0"+s

document.getElementById("relogio").innerText=h+":"+m+":"+s
}

setInterval(atualizarRelogio,1000)

/* LIVRO */

function salvar(){
let texto=document.getElementById("texto").value
localStorage.setItem("livroTexto",texto)
}

function limpar(){
localStorage.removeItem("livroTexto")
document.getElementById("texto").value=""
}

window.onload=function(){
let salvo=localStorage.getItem("livroTexto")
if(salvo){
document.getElementById("texto").value=salvo
}
}

/* MINIJOGO */

let pontos=0

function clicar(){
pontos++
document.getElementById("pontos").innerText=pontos
}

/* SUGESTÕES */

function enviarSug(){
let s=document.getElementById("sug").value
document.getElementById("listaSug").innerHTML+="<br>"+s
document.getElementById("sug").value=""
}

/* ESTRELAS */

let canvas=document.getElementById("estrelas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrelas=[]

for(let i=0;i<100;i++){
estrelas.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})
}

function desenhar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

for(let i=0;i<estrelas.length;i++){
let e=estrelas[i]

ctx.beginPath()
ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
ctx.fill()

e.y+=0.2

if(e.y>canvas.height){
e.y=0
}
}

requestAnimationFrame(desenhar)
}

desenhar()

</script>

</body>
</html>
