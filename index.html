<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
text-align:center;
}

/* Tela de espera */
#espera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
z-index:10;
}

/* Estrelas */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* Caixa de conquista */
#conquista{
position:fixed;
bottom:20px;
right:20px;
background:#222;
padding:15px;
border-radius:10px;
display:none;
max-width:200px;
}

.mostrar{
display:block !important;
}

textarea{
width:80%;
max-width:400px;
height:100px;
}

button{
margin:5px;
padding:10px;
font-size:16px;
}
</style>
</head>

<script>

/* ESPERA RGB */
let r=0,g=0,b=0,dr=1,dg=2,db=3;

function animarRGB(){
r+=dr;if(r>255||r<0) dr*=-1;
g+=dg;if(g>255||g<0) dg*=-1;
b+=db;if(b>255||b<0) db*=-1;

let espera=document.getElementById('espera');
if(espera){
espera.style.background=`rgb(${r},${g},${b})`;
}

requestAnimationFrame(animarRGB);
}
animarRGB();

/* RELÓGIO */
function atualizarRelogio(){
let a=new Date();
let h=a.getHours().toString().padStart(2,"0");
let m=a.getMinutes().toString().padStart(2,"0");
let s=a.getSeconds().toString().padStart(2,"0");
document.getElementById("relogio").innerText=h+":"+m+":"+s;
}
setInterval(atualizarRelogio,1000);
atualizarRelogio();

/* LIVRO */
function salvar(){
let t=document.getElementById("livro").value;
localStorage.setItem("livro",t);
}

function limpar(){
localStorage.removeItem("livro");
document.getElementById("livro").value="";
}

/* MINIJOGO */
let pontos=0;

function clicar(){
pontos++;
document.getElementById("pontos").innerText=pontos;

if(pontos==100){
conquista("Curioso","Você chegou a 100 pontos");
}
if(pontos==200){
conquista("Cliqueiro","200 pontos!");
}
if(pontos==300){
conquista("Sem vida","300 pontos kkk");
}
}

function conquista(titulo,texto){
let c=document.getElementById("conquista");
document.getElementById("titulo").innerText="🏆 "+titulo;
document.getElementById("texto").innerText=texto;

c.classList.add("mostrar");

setTimeout(()=>{
c.classList.remove("mostrar");
},4000);
}
