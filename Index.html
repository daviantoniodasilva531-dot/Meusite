<script>

/* ==================== ESPERA RGB ==================== */

let r=0,g=0,b=0,dr=1,dg=2,db=3;

function animarRGB(){
  r+=dr;if(r>255||r<0) dr*=-1;
  g+=dg;if(g>255||g<0) dg*=-1;
  b+=db;if(b>255||b<0) db*=-1;

  document.getElementById('espera').style.background =
  `rgb(${r},${g},${b})`;

  requestAnimationFrame(animarRGB);
}

animarRGB();



/* ==================== RELÓGIO ==================== */

function atualizarRelogio(){

  let a=new Date()

  let h=a.getHours().toString().padStart(2,"0")
  let m=a.getMinutes().toString().padStart(2,"0")
  let s=a.getSeconds().toString().padStart(2,"0")

  document.getElementById("relogio").innerText =
  h+":"+m+":"+s

}

setInterval(atualizarRelogio,1000)
atualizarRelogio()



/* ==================== LIVRO ==================== */

function salvar(){

  let t=document.getElementById("livro").value

  localStorage.setItem("livro",t)

}

function limpar(){

  localStorage.removeItem("livro")

  document.getElementById("livro").value=""

}



/* ==================== MINIJOGO ==================== */

let pontos=0

function clicar(){

  pontos++

  document.getElementById("pontos").innerText=pontos

  if(pontos==100){
  conquista("Curioso","Você chegou a 100 pontos")
  }

  if(pontos==200){
  conquista("Cliqueiro","200 pontos!")
  }

  if(pontos==300){
  conquista("Sem vida","300 pontos kkk")
  }

}



function conquista(titulo,texto){

  let c=document.getElementById("conquista")

  document.getElementById("titulo").innerText="🏆 "+titulo
  document.getElementById("texto").innerText=texto

  c.classList.add("mostrar")

  setTimeout(()=>{
  c.classList.remove("mostrar")
  },4000)

}



/* ==================== ESTRELAS ==================== */

let canvas=document.getElementById("estrelas")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let estrelas=[]

for(let i=0;i<20;i++){

  estrelas.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2
  })

}

function animar(){

  ctx.clearRect(0,0,canvas.width,canvas.height)

  ctx.fillStyle="white"

  for(let e of estrelas){

    ctx.beginPath()
    ctx.arc(e.x,e.y,e.r,0,Math.PI*2)
    ctx.fill()

    e.y+=0.3

    if(e.y>canvas.height){
      e.y=0
    }

  }

  requestAnimationFrame(animar)

}

animar()



/* ==================== QUANDO O SITE CARREGAR ==================== */

window.onload=function(){

  document.getElementById("espera").style.display="none"

  let t=localStorage.getItem("livro")

  if(t){
    document.getElementById("livro").value=t
  }

}

</script>
